name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: build · typecheck · test · conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Drift guard: regenerated artifacts (spec types/schemas + bank themes + Tokens Studio
      # import fixture + Flutter Dart goldens) must match what's committed. Catches "edited the
      # manifest or a generator but forgot to regenerate."
      - name: Verify generated artifacts are in sync
        run: |
          pnpm --filter @polymorph/spec generate
          node examples/gen-mock-bank-themes.mjs
          node tooling/authoring/scripts/gen-tokens-studio-fixture.mjs
          # update-goldens loads @polymorph/core via tsx → needs the package's dist on disk.
          # Build the adapter (Nx handles spec+core transitively) before invoking the script.
          pnpm exec nx run @polymorph/adapter-flutter:build
          pnpm --filter @polymorph/adapter-flutter run update-goldens
          if ! git diff --quiet; then
            echo "::error::Generated artifacts are out of sync. Re-run the generators above and commit."
            git --no-pager diff --stat
            exit 1
          fi

      - name: Build · typecheck · test · conformance
        run: pnpm exec nx run-many -t build typecheck test conformance --output-style=stream

      # Failing golden-screenshot tests write actual / baseline / diff PNGs under
      # `**/__diffs__/`. Surface them as a downloadable artifact so reviewers can see
      # exactly what changed without re-running locally.
      - name: Upload golden diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs
          path: packages/**/__diffs__/**
          if-no-files-found: ignore
          retention-days: 14
